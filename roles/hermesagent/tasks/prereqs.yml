---
# Prereqs for hermes-agent installer.
#
# Node.js 22.x, git, curl, ca-certificates are already present (openclaw-ansible).
# We pre-install build tools and Python dev headers so the installer does NOT
# prompt for sudo interactively (the install.sh reads /dev/tty for these if missing).
# python3-venv is required for uv to bootstrap its managed Python 3.11 builds.
# ripgrep and ffmpeg are optional features the installer would otherwise prompt for.

- name: Ensure hermes-agent installer dependencies are present
  ansible.builtin.apt:
    name:
      - git
      - curl
      - ca-certificates
      - python3-venv
      - build-essential
      - python3-dev
      - libffi-dev
      - ripgrep
      - ffmpeg
      - acl
    state: present
    update_cache: false

# Playwright Chromium system deps — install as root so the installer
# (running as hermesagent user without sudo) doesn't hang on `--with-deps`.
- name: Ensure Playwright Chromium system dependencies are present
  ansible.builtin.apt:
    name:
      - libnss3
      - libatk1.0-0t64
      - libatk-bridge2.0-0t64
      - libcups2t64
      - libdrm2
      - libxkbcommon0
      - libatspi2.0-0t64
      - libxdamage1
      - libgbm1
      - libpango-1.0-0
      - libcairo2
      - libasound2t64
    state: present
    update_cache: false
